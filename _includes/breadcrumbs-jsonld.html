{%- comment -%}
  BreadcrumbList JSON-LD for AI/search navigation.
  Builds a 2-3 level breadcrumb from the URL.
{%- endcomment -%}
{%- if page.url != '/' -%}
{%- assign url_parts = page.url | remove_first: '/' | split: '/' -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}{{ site.baseurl }}/"
    }{%- if page.collection == 'publications' %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Publications",
      "item": "{{ site.url }}{{ site.baseurl }}/publications/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | strip_html | jsonify }},
      "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
    }
    {%- elsif page.collection == 'talks' %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Talks",
      "item": "{{ site.url }}{{ site.baseurl }}/talks/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | strip_html | jsonify }},
      "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
    }
    {%- elsif page.collection == 'teaching' %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Teaching",
      "item": "{{ site.url }}{{ site.baseurl }}/teaching/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | strip_html | jsonify }},
      "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
    }
    {%- elsif page.collection == 'portfolio' %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Portfolio",
      "item": "{{ site.url }}{{ site.baseurl }}/portfolio/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | strip_html | jsonify }},
      "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
    }
    {%- else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | default: page.url | strip_html | jsonify }},
      "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
    }
    {%- endif %}
  ]
}
</script>
{%- endif -%}
